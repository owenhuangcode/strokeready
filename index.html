<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>StrokeGuard SG</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#F2F2F4;--sf:#FFF;--sk:#EAEAED;
--t1:#111318;--t2:#4A4D56;--t3:#82858E;--t4:#A8ABB3;

}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Outfit',-apple-system,sans-serif;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.dv{width:393px;height:852px;background:var(--bg);border-radius:44px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 0 0 1.5px #333,0 30px 80px rgba(0,0,0,.5)}
.sb{height:54px;padding:16px 28px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;z-index:20}
.sb-t{font-size:15px;font-weight:600;color:var(--t1)}.sb-i{display:flex;gap:5px;align-items:center;opacity:.6}.sb-i svg{width:16px;height:12px;color:var(--t1)}
.tb{padding:4px 20px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.tb-l{display:flex;align-items:center;gap:10px}
.av{width:42px;height:42px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid #d8d8dc}.av img{width:100%;height:100%;object-fit:cover}
.loc-l{font-size:11px;font-weight:500;color:var(--red);letter-spacing:.02em;line-height:1.2}
.loc-a{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.01em}
.tb-r{display:flex;gap:8px}
.ti{width:40px;height:40px;border-radius:50%;border:1px solid var(--bd);background:var(--sf);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s}

.ftb{padding:6px 20px 12px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.ftb-x{display:flex;align-items:center;gap:3px;font-size:16px;font-weight:400;color:var(--t3);background:none;border:none;cursor:pointer;padding:8px 10px 8px 4px;font-family:inherit;border-radius:var(--rxx);transition:all .2s}
.ftb-x:hover{color:var(--t2);background:var(--sk)}.ftb-x svg{width:18px;height:18px}
.ftb-r{display:flex;gap:8px}
.ct{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.scr{animation:si .3s ease both}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.bn{height:82px;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-around;padding:12px 6px 0;flex-shrink:0}
.ni{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;background:none;border:none;font-family:inherit;padding:2px 10px}
.ni svg{width:24px;height:24px;color:var(--t4)}.ni span{font-size:10px;color:var(--t4);font-weight:500}
.ni.on svg{color:var(--t1)}.ni.on span{color:var(--t1);font-weight:700}
.sn{width:58px;height:58px;border-radius:50%;background:var(--red);border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;margin-top:-24px;box-shadow:0 4px 18px rgba(200,52,43,.3);transition:transform .2s}
.sn:hover{transform:scale(1.05)}.sn:active{transform:scale(.95)}
.sn svg{width:22px;height:22px;color:white}.sn>span{font-size:8px;color:white;font-weight:700;letter-spacing:.06em;margin-top:1px}
.tg{display:inline-flex;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:5px 12px;border-radius:var(--rf)}
.tg-r{background:var(--rs);color:var(--red)}.tg-g{background:var(--gs);color:var(--grn)}.tg-b{background:var(--bls);color:var(--blu)}.tg-p{background:var(--ps);color:var(--pur)}
.srch{margin:0 20px 16px;padding:14px 16px;background:var(--sf);border:1.5px solid var(--bd);border-radius:var(--r);display:flex;align-items:center;gap:10px}
.srch svg{width:18px;height:18px;color:var(--t4);flex-shrink:0}.srch span{font-size:15px;color:var(--t4)}.srch-e{margin-left:auto}
.sh{display:flex;justify-content:space-between;align-items:baseline;padding:0 20px;margin-bottom:12px}
.sh-t{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.sh-l{font-size:14px;font-weight:400;color:var(--t3);background:none;border:none;font-family:inherit;cursor:pointer}
.pg{padding:0 20px;display:flex;gap:10px;flex-shrink:0;margin-bottom:28px}
.pg-s{height:5px;flex:1;border-radius:3px;background:#E0E0E4}.pg-s.dn{background:var(--grn)}.pg-s.ac{background:var(--red)}
.btn{padding:16px 24px;border-radius:var(--rs2);font-size:16px;font-weight:600;font-family:inherit;border:none;text-align:center;letter-spacing:-.01em;cursor:pointer;transition:all .2s}
.btn-bk{background:var(--sf);color:var(--t1);border:1.5px solid var(--bd)}.btn-bk:hover{background:var(--sk)}
.btn-nx{background:var(--t1);color:white}.btn-nx:hover{background:#2a2d35}
.btn-off{background:#E8E8EB;color:#B0B0B6;cursor:default}
.btn-rd{background:var(--red);color:white}.btn-rd:hover{background:var(--rd)}
.btn-w{width:100%}.br{display:flex;gap:10px}
.ba{padding:10px 20px 16px;flex-shrink:0;display:flex;flex-direction:column;gap:10px}
.sf-lnk{display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--red);padding:4px 0;cursor:pointer;background:none;border:none;font-family:inherit;width:100%}.sf-lnk svg{width:16px;height:16px}
.sb12{height:12px;flex-shrink:0}
.btn-gh{background:transparent;color:var(--t2);border:none;padding:14px 20px;cursor:pointer;font-family:inherit;font-size:16px;font-weight:500}
.hero{margin:0 20px 22px;padding:28px 24px;background:linear-gradient(135deg,#C8342B 0%,#B83028 60%,#A52A23 100%);border-radius:var(--r);position:relative;overflow:hidden;cursor:pointer;transition:transform .2s}
.hero:hover{transform:translateY(-1px)}
.hero::before{content:'';position:absolute;top:-40px;right:-20px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.06)}
.hero::after{content:'';position:absolute;bottom:-50px;right:40px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-tg{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.55);margin-bottom:14px}
.hero-t{font-size:26px;font-weight:700;color:white;line-height:1.15;letter-spacing:-.02em;margin-bottom:10px;max-width:260px}
.hero-s{font-size:14px;color:rgba(255,255,255,.65);line-height:1.45;max-width:280px;margin-bottom:18px}
.hero-b{display:inline-flex;align-items:center;gap:6px;background:white;color:var(--red);font-size:14px;font-weight:600;padding:12px 22px;border-radius:var(--rf);font-family:inherit;border:none;cursor:pointer;position:relative;z-index:1}
.hero-b svg{width:14px;height:14px}
.hc{margin:0 20px 14px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s}
.hc:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.hc-img{height:170px;overflow:hidden}.hc-img img{width:100%;height:100%;object-fit:cover}
.hc-b{padding:14px 18px}
.hc-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.hc-nm{font-size:16px;font-weight:600;color:var(--t1)}.hc-d{display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600;color:var(--t2);flex-shrink:0}
.hc-d svg{width:14px;height:14px;color:var(--t1)}.hc-m{font-size:13px;color:var(--t3);margin-bottom:2px}.hc-tag{font-size:13px;font-weight:600;color:var(--red)}
.lrn-t{font-size:30px;font-weight:800;color:var(--t1);letter-spacing:-.03em;padding:0 20px 16px}
.ac{margin:0 20px 14px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;display:flex}
.ac:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.ac-im{width:140px;min-height:130px;flex-shrink:0;overflow:hidden}.ac-im img{width:100%;height:100%;object-fit:cover}
.ac-b{padding:16px 18px;flex:1;display:flex;flex-direction:column;justify-content:center}
.ac-tg{margin-bottom:8px}.ac-tt{font-size:16px;font-weight:700;color:var(--t1);line-height:1.25;margin-bottom:6px}
.ac-ex{font-size:13px;color:var(--t3);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ad-im{width:100%;height:260px;border-radius:var(--r);overflow:hidden;margin-bottom:22px}.ad-im img{width:100%;height:100%;object-fit:cover}
.ad{padding:0 20px}.ad h2{font-size:26px;font-weight:700;color:var(--t1);line-height:1.15;letter-spacing:-.02em;margin-bottom:16px}
.ad p{font-size:16px;color:var(--t2);line-height:1.6;margin-bottom:18px}.ad h3{font-size:18px;font-weight:700;color:var(--t1);margin-bottom:10px}
.map-area{height:340px;overflow:hidden}.map-area img{width:100%;height:100%;object-fit:cover}
.nc{margin:0 20px 10px;padding:16px 18px;background:var(--sf);border-radius:var(--r);border:1px solid var(--bd);cursor:pointer;transition:all .2s;display:flex;gap:14px;align-items:center}
.nc:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.nc-i{width:46px;height:46px;border-radius:var(--rs2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nc-i.gv{background:var(--rs)}.nc-i.gv svg{color:var(--red)}.nc-i.pv{background:var(--bls)}.nc-i.pv svg{color:var(--blu)}
.nc-i svg{width:20px;height:20px}
.nc-inf{flex:1}.nc-nm{font-size:15px;font-weight:600;color:var(--t1);margin-bottom:3px}
.nc-mt{font-size:12px;color:var(--t3);display:flex;align-items:center;gap:6px}.nc-mt .tg{font-size:10px;padding:2px 8px}
.nc-d{font-size:14px;font-weight:600;color:var(--t2);flex-shrink:0}
.hd{padding:0 20px 20px}
.hd-img{width:100%;height:240px;border-radius:var(--r);overflow:hidden;margin-bottom:18px}.hd-img img{width:100%;height:100%;object-fit:cover}
.hd-nm{font-size:24px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-bottom:4px}
.hd-sub{font-size:14px;color:var(--t3);margin-bottom:14px}
.hd-desc{font-size:15px;color:var(--t2);line-height:1.5;margin-bottom:22px}
.cg{display:flex;gap:10px;margin-bottom:22px}
.ci{flex:1;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs2);padding:16px 10px;text-align:center}
.ci svg{width:24px;height:24px;color:var(--t4);margin-bottom:8px}
.ci-l{font-size:12px;color:var(--t3);font-weight:500;margin-bottom:4px}.ci-v{font-size:14px;font-weight:700}.ci-v.y{color:var(--grn)}.ci-v.m{color:var(--amb)}
.cb-r{display:flex;gap:10px}
.cb{flex:1;padding:16px;border-radius:var(--rf);font-size:15px;font-weight:600;font-family:inherit;border:none;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:all .2s}
.cb svg{width:18px;height:18px}
.cb-p{background:var(--red);color:white}.cb-p:hover{background:var(--rd)}
.cb-s{background:var(--sf);color:var(--t1);border:1.5px solid var(--bd)}.cb-s:hover{border-color:var(--bh)}
.sth{padding:0 24px;flex-shrink:0}
.st-tg{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--red);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.st-dot{width:7px;height:7px;border-radius:50%;background:var(--red)}
.st-t{font-size:30px;font-weight:700;color:var(--t1);line-height:1.1;letter-spacing:-.03em;margin-bottom:10px}
.st-s{font-size:16px;color:var(--t3);line-height:1.4}
.cs{flex:1;display:flex;flex-direction:column;justify-content:center;padding:28px 20px 16px}
.cs-l{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:16px}
.cs-r{display:flex;gap:14px}
.cd{flex:1;background:var(--sf);border:2px solid var(--bd);border-radius:var(--r);padding:16px 10px 18px;cursor:pointer;display:flex;flex-direction:column;align-items:center;text-align:center;position:relative;user-select:none;transition:border-color .2s,box-shadow .2s,transform .2s,background .2s}
.cd:hover{border-color:var(--bh);box-shadow:var(--sh-md);transform:translateY(-2px)}
.cd:active{transform:translateY(0) scale(.985)}
.cd.sok{border-color:var(--grn);background:var(--gs)}.cd.swn{border-color:var(--red);background:var(--rs)}
.cd-ck{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transform:scale(0);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.cd-ck svg{width:14px;height:14px;stroke-width:3;color:white}
.cd.sok .cd-ck{opacity:1;transform:scale(1);background:var(--grn)}
.cd.swn .cd-ck{opacity:1;transform:scale(1);background:var(--red)}
.cd-im{width:100%;height:180px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.cd-im img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--rxx)}
.cd-t{font-size:15px;font-weight:600;color:var(--t1);line-height:1.25}
.fbs{padding:0 20px;min-height:44px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.fbm{font-size:14px;font-weight:500;color:var(--t3);text-align:center}
.fbm.w{color:var(--red);font-weight:600;display:inline-flex;align-items:center;gap:8px;background:var(--rs);padding:10px 18px;border-radius:var(--rf)}
.fbm.w svg{width:18px;height:18px;flex-shrink:0}
.spw{width:100%;height:160px;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
.spc{width:96px;height:96px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.spc svg{width:42px;height:42px}
.spc.ok{background:var(--gs)}.spc.ok svg{color:var(--grn)}
.spc.bd{background:var(--rs)}.spc.bd svg{color:var(--red)}
.rsc{padding:24px 24px 0;flex:1}
.ri{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.ri.dng{background:var(--rs)}.ri.saf{background:var(--gs)}.ri svg{width:30px;height:30px}
.rst{font-size:26px;font-weight:700;color:var(--t1);line-height:1.15;letter-spacing:-.02em;margin-bottom:10px}
.rsd{font-size:15px;color:var(--t2);line-height:1.45;margin-bottom:22px}
.rtb{background:var(--sf);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);margin-bottom:22px}
.rr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px}
.rr+.rr{border-top:1px solid var(--bd)}
.rrl{font-size:15px;font-weight:500;color:var(--t2)}.rrv{font-size:15px;font-weight:700}.rrv.ok{color:var(--grn)}.rrv.fl{color:var(--red)}
.tn{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;background:var(--as);border-radius:var(--rs2);margin-bottom:20px}
.tn svg{width:20px;height:20px;color:var(--amb);flex-shrink:0;margin-top:2px}
.tn-t{font-size:14px;color:var(--amb);line-height:1.45;font-weight:500}
.ec{background:var(--red);color:white;border-radius:var(--r);padding:18px 22px;display:flex;align-items:center;gap:16px;border:none;width:100%;text-align:left;font-family:inherit;margin-bottom:14px;cursor:pointer;transition:background .2s}
.ec:hover{background:var(--rd)}
.ec-i{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}.ec-i svg{width:22px;height:22px;color:white}
.ec-tx{flex:1}.ec-t{font-size:17px;font-weight:700}.ec-s{font-size:12px;opacity:.75;margin-top:2px}
.ec-a{opacity:.5}.ec-a svg{width:20px;height:20px}
.ic{flex:1;display:flex;flex-direction:column;padding:10px 24px 0}
.ib{display:inline-flex;align-items:center;gap:7px;background:var(--rs);color:var(--red);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:8px 16px;border-radius:var(--rf);width:fit-content;margin-bottom:20px}

.it{font-size:38px;font-weight:700;color:var(--t1);line-height:1.05;letter-spacing:-.035em;margin-bottom:14px}
.id{font-size:16px;color:var(--t3);line-height:1.45;margin-bottom:32px;max-width:320px}
.ist{display:flex;flex-direction:column;background:var(--sf);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd);margin-bottom:auto}
.isr{display:flex;align-items:center;gap:16px;padding:18px 20px}.isr+.isr{border-top:1px solid var(--bd)}
.isn{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.isn.n1{background:#FEF3C7;color:#92400E}.isn.n2{background:var(--bls);color:#1E40AF}.isn.n3{background:var(--ps);color:#5B21B6}
.isxt{font-size:16px;font-weight:500;color:var(--t1)}.isxt strong{font-weight:700}
/* FIX5+6: SOS + Calling vertical centering */
.sos-s{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px 60px}
.sos-btn{width:210px;height:210px;border-radius:50%;background:var(--red);border:none;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 0 0 0 rgba(200,52,43,.3);animation:sp 2s infinite;transition:transform .2s;position:relative;overflow:hidden}
.sos-btn:hover{transform:scale(1.03)}.sos-btn:active{transform:scale(.97);animation:none}
.sos-btn .st2{font-size:48px;font-weight:800;color:white;position:relative;z-index:2}
.sos-btn .ss2{font-size:14px;color:rgba(255,255,255,.7);font-weight:500;margin-top:4px;position:relative;z-index:2}
.sos-btn .hr{position:absolute;inset:-4px;border-radius:50%;border:4px solid transparent;border-top-color:white;opacity:0}
.sos-btn.holding .hr{opacity:1;animation:spn 2s linear}
@keyframes spn{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes sp{0%{box-shadow:0 0 0 0 rgba(200,52,43,.35)}70%{box-shadow:0 0 0 30px rgba(200,52,43,0)}100%{box-shadow:0 0 0 0 rgba(200,52,43,0)}}

.sos-wt h3{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:10px}.sos-wt p{font-size:15px;color:var(--t2);line-height:1.5}
.sos-can{margin-top:28px;font-size:15px;font-weight:400;color:var(--t3);background:none;border:1.5px solid var(--bd);padding:12px 32px;border-radius:var(--rf);cursor:pointer;font-family:inherit}
.sos-cl{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 20px 100px}
.sos-cl-r{width:130px;height:130px;border-radius:50%;background:var(--red);display:flex;align-items:center;justify-content:center;animation:sp 1.5s infinite}
.sos-cl-r svg{width:48px;height:48px;color:white}
.sos-cl h3{font-size:28px;font-weight:700;color:var(--t1);margin-top:28px;margin-bottom:6px}
.sos-cl .num{font-size:18px;font-weight:600;color:var(--t2);margin-bottom:8px}
.sos-cl p{font-size:15px;color:var(--t3);margin-bottom:32px;text-align:center}
.sos-cl-can{font-size:15px;font-weight:500;color:var(--red);background:none;border:1.5px solid var(--rb);padding:12px 36px;border-radius:var(--rf);cursor:pointer;font-family:inherit}
.sos-cf{flex:1;display:flex;flex-direction:column;align-items:center;padding:30px 24px}
.sos-cf-i{width:80px;height:80px;border-radius:50%;background:var(--gs);display:flex;align-items:center;justify-content:center;margin-bottom:20px}
.sos-cf-i svg{width:40px;height:40px;color:var(--grn)}
.sos-cf h2{font-size:28px;font-weight:700;color:var(--grn);margin-bottom:8px}
.sos-cf>p{font-size:16px;color:var(--t2);text-align:center;line-height:1.45;margin-bottom:28px}
.ap{display:flex;align-items:center;gap:12px;background:var(--red);color:white;padding:16px 22px;border-radius:var(--r);margin-bottom:28px;width:100%}
.ap svg{width:20px;height:20px;flex-shrink:0}.ap-t{flex:1}.ap-l{font-size:12px;opacity:.7}.ap-a{font-size:15px;font-weight:600}
.nc2{width:100%;background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:20px 22px}
.nc2 h4{font-size:16px;font-weight:700;color:var(--t1);margin-bottom:16px}
.ni2{display:flex;align-items:flex-start;gap:12px;padding:10px 0;font-size:15px;color:var(--t2);line-height:1.4}
.ni2+.ni2{border-top:1px solid var(--bd)}
.nb2{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:7px}
.pf-h{text-align:center;padding:20px 0 28px}
.pf-av{width:80px;height:80px;border-radius:50%;margin:0 auto 14px;overflow:hidden;border:2px solid #d8d8dc}.pf-av img{width:100%;height:100%;object-fit:cover}
.pf-nm{font-size:22px;font-weight:700;color:var(--t1);margin-bottom:4px}.pf-lc{font-size:14px;color:var(--t3)}
.pf-m{display:flex;flex-direction:column;gap:8px;padding:0 20px}
.pf-i{display:flex;align-items:center;gap:16px;padding:18px 20px;background:var(--sf);border-radius:var(--r);cursor:pointer;border:1px solid var(--bd)}
.pf-ii{width:40px;height:40px;border-radius:var(--rs2);display:flex;align-items:center;justify-content:center;flex-shrink:0}.pf-ii svg{width:20px;height:20px}
.pf-it{flex:1;font-size:16px;font-weight:500;color:var(--t1)}
.pf-ia svg{width:18px;height:18px;color:var(--t4)}
.mo{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:flex-end;justify-content:center;animation:moI .2s ease}
@keyframes moI{from{opacity:0}to{opacity:1}}
.ms{width:100%;background:var(--sf);border-radius:24px 24px 0 0;padding:32px 24px 24px;animation:msU .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes msU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.ms h3{font-size:20px;font-weight:700;color:var(--t1);margin-bottom:8px}
.ms p{font-size:15px;color:var(--t2);line-height:1.45;margin-bottom:24px}
.ms-b{display:flex;flex-direction:column;gap:10px}.ms-b .btn{width:100%}
/* FIX3: Truck animation */
@keyframes truckDrive{0%{transform:translateX(-8px)}50%{transform:translateX(8px)}100%{transform:translateX(-8px)}}
.truck-anim{animation:truckDrive 3s ease-in-out infinite}
@media(max-width:420px){.dv{width:100vw;height:100vh;border-radius:0;box-shadow:none}}
</style>

function tryExitSOS(){if(S.sosPh==='confirmed'){showModal('Leave Emergency Screen?','Help has been dispatched to your location. You can return here from the SOS button.','Return to Home','doExitSOS()','Stay Here','closeModal()')}else doExitSOS()}
function doExitSOS(){closeModal();S.sub=null;S.sosPh=null;render()}

function render(){
  if(S.sub==='fast'){rFAST();return}
  if(S.sub==='sos'){rSOSF();return}
  if(S.sub&&S.sub.startsWith('art')){rArt(parseInt(S.sub.slice(3)));return}
  if(S.sub&&S.sub.startsWith('hosp')){rHosp(S.sub.slice(4));return}
  switch(S.tab){case'home':rHome();break;case'learn':rLearn();break;case'nearby':rNear();break;case'profile':rProf();break}
}

<div class="fbs">${fb_('speech')}</div>
<div class="ba"><div class="br"><button class="btn btn-bk" onclick="fGo(2)">Back</button><button class="btn ${S.fast.speech?'btn-nx':'btn-off'}" style="flex:1" ${S.fast.speech?'onclick="fGo(4)"':''}>See Results</button></div>${sf_()}<div class="sb12"></div></div></div></div>`}

${bad?`<button class="ec" onclick="S.sosPh='calling';S.sub='sos';render()"><div class="ec-i">${I.ph}</div><div class="ec-tx"><div class="ec-t">Call 995 Now</div><div class="ec-s">Singapore Emergency Ambulance</div></div><div class="ec-a">${I.cr}</div></button>`:''}
</div>
<div class="ba">${bad?`<button class="btn btn-bk btn-w" onclick="rstF()">Start Over</button>`:`<div class="br"><button class="btn btn-bk" onclick="rstF()">Start Over</button><button class="btn btn-nx" style="flex:1" onclick="doExitFAST()">Done</button></div>`}<div class="sb12"></div></div></div></div>`}
